<!doctype html>
<html lang="ar">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIOW Parfumes — Haute Parfumerie d'Exception</title>

    <!-- Polices latines -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Inter:wght@300;400;500;600;800&display=swap"
      rel="stylesheet"
    />

    <!-- Police arabe Cairo — lettres connectées et élégantes -->
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Material Symbols -->
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
      rel="stylesheet"
    />

    <style>
      /* Applique Cairo sur tout le contenu quand la langue est arabe */
      body.lang-ar,
      body.lang-ar *:not(.material-symbols-outlined) {
        font-family: 'Cairo', sans-serif !important;
        letter-spacing: 0 !important;
      }
      /* Sauf les titres headline qui gardent un style fort */
      body.lang-ar .font-headline {
        font-family: 'Cairo', sans-serif !important;
        font-weight: 800 !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
